services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: elineas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: elineas_auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - elineas-auth-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elineas -d elineas_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--save",
        "60",
        "1",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - elineas-auth-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: prod
    container_name: elineas-auth-api
    restart: unless-stopped
    ports:
      - "3001:8080"
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://elineas:${POSTGRES_PASSWORD}@postgres:5432/elineas_auth
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - elineas-auth-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:8080/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:

networks:
  elineas-auth-net:
    external: true
