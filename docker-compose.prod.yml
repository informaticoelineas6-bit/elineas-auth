# Despliegue de producción: sin Postgres local, la API se conecta a Neon.
# Redis SÍ se despliega aquí (contenedor interno) para el rate limiting.
#
# Requiere que REDIS_PASSWORD esté disponible para compose (en un archivo `.env`
# junto a este compose o exportada en el entorno). Ejemplo:
#   echo "REDIS_PASSWORD=$(openssl rand -hex 32)" >> .env
#
# Uso: docker compose -f docker-compose.prod.yml up -d --build
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Redis NO expone puertos al host: solo es accesible desde la red interna
    # de compose (servicio `api`). Protegido además con contraseña.
    command:
      [
        "redis-server",
        "--save",
        "60",
        "1",
        "--requirepass",
        "${REDIS_PASSWORD:?Define REDIS_PASSWORD para producción}",
      ]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: prod
    image: elineas-auth:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redisdata:
