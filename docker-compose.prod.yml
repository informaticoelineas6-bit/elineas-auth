services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: elineas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD para producción}
      POSTGRES_DB: elineas_auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elineas -d elineas_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--save",
        "60",
        "1",
        "--requirepass",
        "${REDIS_PASSWORD:?Define REDIS_PASSWORD para producción}",
      ]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: prod
    image: elineas-backend:latest
    restart: unless-stopped
    env_file:
      - apps/backend/.env.production
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://elineas:${POSTGRES_PASSWORD}@postgres:5432/elineas_auth
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:8080/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    profiles: ["migrate"]
    env_file:
      - apps/backend/.env.production
    working_dir: /app/apps/backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://elineas:${POSTGRES_PASSWORD}@postgres:5432/elineas_auth
    command: ["bunx", "--env-file=/dev/null", "drizzle-kit", "migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: prod
      args:
        VITE_BACKEND_URL: ${PUBLIC_BACKEND_URL:?Define PUBLIC_BACKEND_URL (URL pública del backend)}
    image: elineas-frontend:latest
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8080
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
