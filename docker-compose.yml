services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: elineas
      POSTGRES_PASSWORD: elineas
      POSTGRES_DB: elineas_auth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elineas -d elineas_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    env_file:
      - apps/backend/.env.local
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://elineas:elineas@postgres:5432/elineas_auth
      REDIS_URL: redis://redis:6379
      # Origen del frontend tal como lo ve el NAVEGADOR (para CORS). El SSR del
      # frontend llama al backend server-a-server (sin Origin), así que solo el
      # origen del navegador necesita estar permitido aquí. Sobrescribe lo que
      # hubiera en apps/backend/.env.local.
      ALLOWED_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/backend/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend de administración (TanStack Start). Servicio SEPARADO que consume
  # el backend por red. `docker compose up frontend` levanta también
  # backend+postgres+redis (vía depends_on); `docker compose up backend`
  # levanta solo el backend y sus datos.
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    environment:
      # Navegador → backend por su URL pública (mapeada al host en :8080).
      VITE_BACKEND_URL: http://localhost:8080
      # SSR/loaders (dentro del contenedor) → backend por la red interna de compose.
      BACKEND_INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
  redisdata:
