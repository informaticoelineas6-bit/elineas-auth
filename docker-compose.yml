services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: elineas
      POSTGRES_PASSWORD: elineas
      POSTGRES_DB: elineas_auth
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elineas -d elineas_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  # Servidor SMTP falso para desarrollo: captura los correos salientes y los
  # muestra en una UI web en lugar de entregarlos. En producción no existe
  # (allí se usa Resend vía HTTP con RESEND_API_KEY).
  maildev:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      # La UI escucha en 1080 dentro del contenedor, pero se publica en 8025:
      # en Windows/WSL2 el rango 1033-1132 está reservado por Hyper-V y Docker
      # no puede exponer el 1080 del host.
      - "8025:1080" # UI web (http://localhost:8025)
      - "1025:1025" # SMTP, expuesto para correr la API en el host (bun run dev)

  api:
    build:
      context: .
      target: dev
    container_name: elineas-auth-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env.local
    environment:
      APP_ENV: local
      DATABASE_URL: postgres://elineas:elineas@postgres:5432/elineas_auth
      REDIS_URL: redis://redis:6379
      # Correos hacia maildev. Sin depends_on a propósito: si maildev no está,
      # el mailer solo loguea el fallo y la API arranca/funciona igual.
      SMTP_HOST: maildev
      SMTP_PORT: 1025
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
